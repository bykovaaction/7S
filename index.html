<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7S Interactive</title>
  <style>
    .cfo7s-root,
    .cfo7s-root * {
      box-sizing: border-box;
    }

    .cfo7s-root {
      --accent: #6F4389;
      --accent-hover: #5e3975;
      --bg: #f5f5f3;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: #ffffff;
      --text: #101010;
      --text-soft: #5f5f5b;
      --text-faint: #8a8a85;
      --line: rgba(16, 16, 16, 0.08);
      --line-strong: rgba(16, 16, 16, 0.12);
      --hover: rgba(16, 16, 16, 0.03);
      --selected: rgba(16, 16, 16, 0.06);
      --selected-line: rgba(16, 16, 16, 0.14);
      --correct-bg: rgba(111, 67, 137, 0.14);
      --correct-line: rgba(111, 67, 137, 0.30);
      --wrong-bg: rgba(16, 16, 16, 0.04);
      --wrong-line: rgba(16, 16, 16, 0.10);
      --button: var(--accent);
      --button-hover: var(--accent-hover);
      --button-text: #ffffff;
      --button-secondary: #f1f1ef;
      --shadow:
        0 1px 2px rgba(16, 16, 16, 0.04),
        0 12px 32px rgba(16, 16, 16, 0.05);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 12px;
      --max-width: 940px;

      width: 100%;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 20px;
    }

    .cfo7s-shell {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      background: var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cfo7s-header {
      padding: 32px 32px 16px;
       border-bottom: 1px solid var(--line);
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(255,255,255,0.72));
    }

    .cfo7s-title {
       margin: 0 0 16px;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.02;
      font-weight: 650;
      letter-spacing: -0.04em;
    }

    .cfo7s-subtitle {
      margin: 0;
      max-width: 760px;
      font-size: 17px;
      line-height: 1.5;
      color: var(--text-soft);
      letter-spacing: -0.01em;
    }

    .cfo7s-body {
      padding: 20px;
    }

    .cfo7s-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .cfo7s-tab {
  appearance: none;
  border: 1px solid rgba(16,16,16,0.06);
  background: rgba(255,255,255,0.55);
  color: #6f6f6a;
  border-radius: 999px;
  padding: 9px 13px;
  min-height: 38px;
  font: inherit;
  font-size: 13px;
  line-height: 1;
  font-weight: 550;
  letter-spacing: -0.01em;
  cursor: pointer;
  transition:
    background 160ms ease,
    border-color 160ms ease,
    color 160ms ease,
    transform 160ms ease;
}

    .cfo7s-tab:hover {
  background: rgba(255,255,255,0.82);
  border-color: rgba(16,16,16,0.10);
  color: var(--text);
}

    .cfo7s-tab:focus-visible {
      outline: 2px solid rgba(111, 67, 137, 0.35);
      outline-offset: 2px;
    }

 .cfo7s-tab.is-active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}

    .cfo7s-scenario {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .cfo7s-scenario-head {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(to bottom, rgba(255,255,255,1), rgba(250,250,248,1));
    }

    .cfo7s-scenario-title {
  margin: 0;
  font-size: clamp(23px, 3vw, 31px);
  line-height: 1.12;
  font-weight: 660;
  letter-spacing: -0.035em;
}

    .cfo7s-table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .cfo7s-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .cfo7s-table thead th {
      text-align: left;
      padding: 14px 24px;
      font-size: 13px;
      line-height: 1.3;
      font-weight: 600;
      color: var(--text-faint);
      border-bottom: 1px solid var(--line);
      background: rgba(250,250,248,0.9);
      letter-spacing: -0.01em;
    }

    .cfo7s-table thead th:first-child {
      width: 34%;
    }

    .cfo7s-row {
      cursor: pointer;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .cfo7s-row:hover {
      background: var(--hover);
    }

    .cfo7s-row.is-selected {
      background: var(--selected);
      box-shadow: inset 0 0 0 1px var(--selected-line);
    }

    .cfo7s-row.is-correct {
      background: var(--correct-bg);
      box-shadow: inset 0 0 0 1px var(--correct-line);
    }

    .cfo7s-row.is-missed {
      background: var(--correct-bg);
      box-shadow: inset 0 0 0 1px var(--correct-line);
    }

    .cfo7s-row.is-wrong {
      background: var(--wrong-bg);
      box-shadow: inset 0 0 0 1px var(--wrong-line);
    }

    .cfo7s-row:focus-within {
      box-shadow: inset 0 0 0 2px rgba(16,16,16,0.16);
    }

    .cfo7s-cell {
      padding: 18px 24px;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    .cfo7s-row:last-child .cfo7s-cell {
      border-bottom: none;
    }

    .cfo7s-key {
      font-weight: 600;
      color: var(--text);
    }

    .cfo7s-value {
      color: var(--text);
    }

    .cfo7s-row-button {
      appearance: none;
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .cfo7s-row-button:focus {
      outline: none;
    }

   .cfo7s-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  padding: 16px 24px 24px;
  background: rgba(250,250,248,0.5);
}

    .cfo7s-btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 44px;
      padding: 0 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition:
        background 160ms ease,
        border-color 160ms ease,
        color 160ms ease,
        transform 160ms ease,
        opacity 160ms ease;
    }

    .cfo7s-btn:hover {
      transform: translateY(-1px);
    }

    .cfo7s-btn:focus-visible {
      outline: 2px solid rgba(111, 67, 137, 0.35);
  outline-offset: 2px;
    }

    .cfo7s-btn:disabled {
      opacity: 0.42;
      cursor: default;
      transform: none;
    }

    .cfo7s-btn-primary {
      background: var(--button);
      color: var(--button-text);
      border-color: var(--button);
      padding: 0 18px;
      min-height: 46px;
      font-weight: 650;
    }

    .cfo7s-btn-primary:hover:not(:disabled) {
      background: var(--button-hover);
      border-color: var(--button-hover);
    }

    .cfo7s-btn-secondary {
      background: var(--button-secondary);
      color: var(--text);
      border-color: rgba(16,16,16,0.06);
    }

    .cfo7s-btn-secondary:hover:not(:disabled) {
      background: #ebebe8;
    }

   .cfo7s-result {
  display: none;
  margin: 0 24px 24px;
  padding: 18px 18px 19px;
  background: #f7f7f4;
  border: 1px solid rgba(16,16,16,0.08);
  border-radius: var(--radius-md);
}

    .cfo7s-result.is-visible {
      display: block;
    }

   .cfo7s-result-label {
  margin: 0 0 8px;
  font-size: 11px;
  line-height: 1.2;
  font-weight: 700;
  color: #6f6f6a;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

    .cfo7s-result-text {
      margin: 0;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .cfo7s-mobile-nav {
      display: none;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 760px) {
      .cfo7s-root {
        padding: 12px;
      }

      .cfo7s-header {
        padding: 24px 18px 14px;
      }

      .cfo7s-body {
        padding: 12px;
      }

      .cfo7s-subtitle {
        font-size: 15px;
      }

      .cfo7s-scenario-head {
        padding: 18px 16px 16px;
      }

      .cfo7s-table,
      .cfo7s-table thead,
      .cfo7s-table tbody,
      .cfo7s-table tr,
      .cfo7s-table th,
      .cfo7s-table td {
        display: block;
        width: 100%;
      }

      .cfo7s-table thead {
        display: none;
      }

      .cfo7s-table-wrap {
        overflow: visible;
      }

      .cfo7s-table tbody {
        padding: 10px;
      }

      .cfo7s-row {
        display: block;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: #fff;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .cfo7s-row:last-child {
        margin-bottom: 0;
      }

      .cfo7s-cell {
        display: block;
        padding: 14px 14px 0;
        border-bottom: 0;
      }

      .cfo7s-cell:last-child {
        padding-bottom: 14px;
      }

      .cfo7s-key {
        font-size: 14px;
      }

      .cfo7s-value {
        font-size: 15px;
      }

      .cfo7s-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  padding: 4px 24px 24px;
  background: rgba(250,250,248,0.5);
}

      .cfo7s-result {
        margin: 0 16px 16px;
      }

      .cfo7s-mobile-nav {
        display: flex;
      }

      .cfo7s-mobile-nav .cfo7s-btn {
        flex: 1 1 0;
      }
    }
  </style>
</head>
<body>
  <div class="cfo7s-root" id="cfo7s-root">
    <div class="cfo7s-shell">
      <div class="cfo7s-header">
        <h2 class="cfo7s-title">Что мешает получить результат — разберите через 7S</h2>
        <p class="cfo7s-subtitle">
Что здесь мешает получить результат? Выберите строки.</p>
      </div>

      <div class="cfo7s-body">
        <div class="cfo7s-tabs" data-tabs></div>
        <div data-panel></div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const tabLabels = ["Пример 1 — отчетность", "Пример 2 — прибыль", "Пример 3 — рост"];

      const scenarios = [
        {
          title: "Отчетность готовят долго",
          correctRows: [1, 2],
          rows: [
            {
              element: "Стратегия (Strategy)",
              current: "В KPI закрепили цель сократить срок подготовки отчетности"
            },
            {
              element: "Системы (Systems)",
              current: "Данные собирают вручную из разных файлов и проверяют вручную"
            },
            {
              element: "Стиль управления (Style)",
              current: "Любые изменения в процессе проходят через несколько уровней согласования"
            }
          ],
      
          explanation:
            "Цель сократить сроки зафиксировали, но сам процесс этому противоречит. Данные собирают вручную, а изменения долго согласуют — поэтому сроки не сокращаются."
        },
        {
          title: "Затраты сократили, но прибыль не растет",
          correctRows: [1],
          rows: [
            {
              element: "Стратегия (Strategy)",
              current: "В KPI есть цель по прибыли"
            },
            {
              element: "Системы (Systems)",
              current: "Не видно, какие продукты и направления дают прибыль, а какие — нет"
            },
            {
              element: "Структура (Structure)",
              current: "За прибыль по направлениям отвечают руководители"
            }
          ],
 
          explanation:
            "Цель и ответственность есть, но нет данных, которые показывают, где компания зарабатывает, а где теряет прибыль. Поэтому решения принимают почти вслепую."
        },
        {
          title: "Компания запускает новые направления, но они не дают роста",
          correctRows: [1, 2],
          rows: [
            {
              element: "Стратегия (Strategy)",
              current: "По новым направлениям запущены проекты и выделено финансирование"
            },
            {
              element: "Навыки (Skills)",
              current: "У команды нет опыта запуска и развития новых направлений"
            },
            {
              element: "Разделяемые ценности (Shared Values)",
              current: "Новые решения оценивают прежде всего по их влиянию на текущий бизнес"
            }
          ],
         
          explanation:
            "Компания инвестирует в новые направления, но команда не умеет их развивать, а решения оценивают через влияние на текущий бизнес. Поэтому новые проекты не становятся приоритетом и не дают роста."
        }
      ];

      const root = document.getElementById("cfo7s-root");
      if (!root) return;

      const tabsContainer = root.querySelector("[data-tabs]");
      const panelContainer = root.querySelector("[data-panel]");
      if (!tabsContainer || !panelContainer) return;

      let activeScenarioIndex = 0;
      const selectedRows = scenarios.map(() => new Set());
      const revealedExplanations = scenarios.map(() => false);

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderTabs() {
        tabsContainer.innerHTML = scenarios
          .map((_, index) => {
            const isActive = index === activeScenarioIndex;
            return `
              <button
                type="button"
                class="cfo7s-tab ${isActive ? "is-active" : ""}"
                data-tab-index="${index}"
                aria-pressed="${isActive ? "true" : "false"}"
                aria-label="${escapeHtml(tabLabels[index])}"
              >
                ${escapeHtml(tabLabels[index])}
              </button>
            `;
          })
          .join("");
      }

      function renderScenario() {
        const scenario = scenarios[activeScenarioIndex];
        const currentSelected = selectedRows[activeScenarioIndex];
        const isExplanationVisible = revealedExplanations[activeScenarioIndex];

        const rowsMarkup = scenario.rows
          .map((row, rowIndex) => {
            const isSelected = currentSelected.has(rowIndex);
            const isCorrect = isExplanationVisible && scenario.correctRows.includes(rowIndex);
            const isWrong = isExplanationVisible && isSelected && !scenario.correctRows.includes(rowIndex);
            const isMissed = isExplanationVisible && !isSelected && scenario.correctRows.includes(rowIndex);

            const rowClasses = [
              "cfo7s-row",
              !isExplanationVisible && isSelected ? "is-selected" : "",
              isCorrect ? "is-correct" : "",
              isWrong ? "is-wrong" : "",
              isMissed ? "is-missed" : ""
            ].filter(Boolean).join(" ");

            return `
              <tr class="${rowClasses}">
                <td class="cfo7s-cell cfo7s-key">
                  <button
                    type="button"
                    class="cfo7s-row-button"
                    data-row-index="${rowIndex}"
                    aria-pressed="${isSelected ? "true" : "false"}"
                  >
                    ${escapeHtml(row.element)}
                  </button>
                </td>
                <td class="cfo7s-cell cfo7s-value">
                  <button
                    type="button"
                    class="cfo7s-row-button"
                    data-row-index="${rowIndex}"
                    aria-pressed="${isSelected ? "true" : "false"}"
                  >
                    ${escapeHtml(row.current)}
                  </button>
                </td>
              </tr>
            `;
          })
          .join("");

        panelContainer.innerHTML = `
          <section class="cfo7s-scenario" aria-live="polite">
            <div class="cfo7s-scenario-head">
              <h3 class="cfo7s-scenario-title">${escapeHtml(scenario.title)}</h3>
            </div>
            
            <div class="cfo7s-table-wrap">
              <table class="cfo7s-table" aria-label="${escapeHtml(tabLabels[activeScenarioIndex])}">
                <thead>
                  <tr>
                    <th>Элемент</th>
                    <th>Как сейчас</th>
                  </tr>
                </thead>
                <tbody>
                  ${rowsMarkup}
                </tbody>
              </table>
            </div>

            <div class="cfo7s-actions">
              <button type="button" class="cfo7s-btn cfo7s-btn-primary" data-action="explain">
                Показать, где несоответствие
              </button>
              <button
                type="button"
                class="cfo7s-btn cfo7s-btn-secondary"
                data-action="reset"
                ${currentSelected.size === 0 && !isExplanationVisible ? "disabled" : ""}
              >
                Сбросить выбор
              </button>
            </div>

            <div class="cfo7s-result ${isExplanationVisible ? "is-visible" : ""}" data-result>
             <div class="cfo7s-result-label">Почему результата нет</div>
              <p class="cfo7s-result-text">${escapeHtml(scenario.explanation)}</p>
            </div>
          </section>

          <div class="cfo7s-mobile-nav">
            <button
              type="button"
              class="cfo7s-btn cfo7s-btn-secondary"
              data-nav="prev"
              ${activeScenarioIndex === 0 ? "disabled" : ""}
            >
              Назад
            </button>
            <button
              type="button"
              class="cfo7s-btn cfo7s-btn-primary"
              data-nav="next"
              ${activeScenarioIndex === scenarios.length - 1 ? "disabled" : ""}
            >
              Следующая ситуация
            </button>
          </div>
        `;
      }

      function render() {
        renderTabs();
        renderScenario();
      }

      function toggleRow(rowIndex) {
        const currentSet = selectedRows[activeScenarioIndex];
        if (currentSet.has(rowIndex)) {
          currentSet.delete(rowIndex);
        } else {
          currentSet.add(rowIndex);
        }
        renderScenario();
      }

      tabsContainer.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-tab-index]");
        if (!tab) return;

        const nextIndex = Number(tab.getAttribute("data-tab-index"));
        if (Number.isNaN(nextIndex)) return;

        activeScenarioIndex = nextIndex;
        render();
      });

      panelContainer.addEventListener("click", (event) => {
        const rowButton = event.target.closest("[data-row-index]");
        if (rowButton) {
          const rowIndex = Number(rowButton.getAttribute("data-row-index"));
          if (!Number.isNaN(rowIndex)) {
            toggleRow(rowIndex);
          }
          return;
        }

        const explainButton = event.target.closest('[data-action="explain"]');
        if (explainButton) {
          revealedExplanations[activeScenarioIndex] = true;
          renderScenario();
          return;
        }

        const resetButton = event.target.closest('[data-action="reset"]');
        if (resetButton) {
          selectedRows[activeScenarioIndex].clear();
          revealedExplanations[activeScenarioIndex] = false;
          renderScenario();
          return;
        }

        const navButton = event.target.closest("[data-nav]");
        if (navButton) {
          const direction = navButton.getAttribute("data-nav");
          if (direction === "prev" && activeScenarioIndex > 0) {
            activeScenarioIndex -= 1;
            render();
          } else if (direction === "next" && activeScenarioIndex < scenarios.length - 1) {
            activeScenarioIndex += 1;
            render();
          }
        }
      });

      render();
    })();
  </script>
</body>
</html>
